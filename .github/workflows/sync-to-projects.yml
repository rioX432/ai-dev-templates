name: Sync to projects

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'
      - 'agents/*.md'
      - 'rules/*.md'
      - 'hooks/**'
      - 'scripts/*.sh'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - CivitDeck
          - live-translate
          - vtslide
          - KMP-FaceLink
          - VocaDrip
          - personal-ai-secretary
          - kamibukuro
          - desk-secretary-bot
    steps:
      - name: Checkout ai-dev-templates
        uses: actions/checkout@v4

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          path: target
          token: ${{ secrets.SYNC_PAT }}

      - name: Sync common skills
        run: |
          SKILLS="dev dev-all review pr dig decompose tech-debt audit competitive-audit"
          for skill in $SKILLS; do
            if [ -f "skills/$skill/SKILL.md" ]; then
              mkdir -p "target/.claude/skills/$skill"
              cp "skills/$skill/SKILL.md" "target/.claude/skills/$skill/SKILL.md"
            fi
          done

      - name: Sync common agents
        run: |
          AGENTS="security-reviewer test-writer"
          for agent in $AGENTS; do
            if [ -f "agents/$agent.md" ]; then
              mkdir -p "target/.claude/agents"
              cp "agents/$agent.md" "target/.claude/agents/$agent.md"
            fi
          done

      - name: Sync common rules
        run: |
          RULES="behavior.md ai-ops.md"
          for rule in $RULES; do
            if [ -f "rules/$rule" ]; then
              mkdir -p "target/.claude/rules"
              cp "rules/$rule" "target/.claude/rules/$rule"
            fi
          done

      - name: Configure git
        working-directory: target
        run: |
          git config user.name "rioX432"
          git config user.email "omooooori432@gmail.com"

      - name: Detect default branch
        id: default-branch
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          DEFAULT=$(gh repo view --json defaultBranchRef -q '.defaultBranchRef.name')
          echo "branch=$DEFAULT" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        working-directory: target
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          DEFAULT_BRANCH="${{ steps.default-branch.outputs.branch }}"
          BRANCH="sync/ai-dev-template-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add .claude/
          git commit -m "Sync ai-dev-template common files"
          git push -u origin "$BRANCH"
          FILES=$(git diff --name-only HEAD~1)
          gh pr create \
            --title "Sync ai-dev-template updates" \
            --body "## Description

          Automated sync of common skills, agents, and rules from ai-dev-templates.

          ### Updated files
          ${FILES}

          ---
          *Auto-generated by [ai-dev-templates sync](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*" \
            --base "$DEFAULT_BRANCH"
